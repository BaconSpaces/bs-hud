<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BS Race Speedometer</title>
    <style>
        /* Inline hard-kill for CEF default white/black page fill */
        html, body { background: transparent !important; background-color: transparent !important; }
    </style>
    <link rel="stylesheet" href="style.css" />
</head>
<body style="background: transparent !important; background-color: transparent !important;">
    <div id="hud" class="hidden">
        <div class="speedo">
            <div class="ring ring-outer"></div>
            <div class="ring ring-glow"></div>
            <svg class="rpm-arc" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="rpmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#00e5ff" />
                        <stop offset="55%" stop-color="#7c5cff" />
                        <stop offset="100%" stop-color="#ff2d55" />
                    </linearGradient>
                </defs>
                <circle class="rpm-track" cx="100" cy="100" r="86" />
                <circle id="rpmFill" class="rpm-fill" cx="100" cy="100" r="86" />
            </svg>

            <div class="core">
                <div class="indicators">
                    <div id="indLeft" class="ind left" title="Left indicator">
                        <span class="arrow">◀</span>
                    </div>
                    <div id="indHazard" class="ind hazard" title="Hazards">
                        <span class="haz">⚠</span>
                    </div>
                    <div id="indRight" class="ind right" title="Right indicator">
                        <span class="arrow">▶</span>
                    </div>
                </div>
                <div class="label">SPEED</div>
                <div class="speed-row">
                    <span id="speed">0</span>
                    <span class="unit">MPH</span>
                </div>
                <div class="meta">
                    <div class="chip">
                        <span class="chip-label">GEAR</span>
                        <span id="gear" class="chip-value">N</span>
                    </div>
                </div>
                <div class="status">
                    <span id="engineDot" class="dot on"></span>
                    <span id="engineText">ENGINE</span>
                </div>
            </div>

            <div class="corner c-tl"></div>
            <div class="corner c-tr"></div>
            <div class="corner c-bl"></div>
            <div class="corner c-br"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
